<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartShala – Branch Resources</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    /* ── Variables ── */
    :root {
      --bg:        #0a0a0f;
      --surface:   #111118;
      --border:    rgba(255,255,255,0.08);
      --text:      #e8e8f0;
      --muted:     #6b6b80;
      --accent:    #6366f1;          /* overridden per branch via JS */
      --radius:    12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Back Bar ── */
    .back-bar {
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .back-bar a {
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color .2s;
    }
    .back-bar a:hover { color: var(--text); }

    /* ── Hero ── */
    .hero {
      padding: 60px 32px 40px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 80% at 20% 0%, color-mix(in srgb, var(--accent) 18%, transparent), transparent 70%);
      pointer-events: none;
    }
    .hero-icon {
      font-size: 56px;
      line-height: 1;
      margin-bottom: 16px;
    }
    .hero h1 {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 700;
      letter-spacing: -1px;
      color: #fff;
    }
    .hero h1 span { color: var(--accent); }
    .hero p {
      margin-top: 12px;
      font-size: 16px;
      color: var(--muted);
      max-width: 560px;
    }
    .hero-badges {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    .badge {
      padding: 4px 14px;
      border-radius: 999px;
      font-size: 12px;
      font-family: 'Space Mono', monospace;
      border: 1px solid var(--accent);
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 10%, transparent);
    }

    /* ── Semester Tabs ── */
    .tab-section {
      padding: 0 32px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .sem-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }
    .sem-tab {
      padding: 10px 22px;
      border: none;
      background: none;
      cursor: pointer;
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color .2s, border-color .2s;
    }
    .sem-tab:hover { color: var(--text); }
    .sem-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── Subject Cards ── */
    .subjects-grid {
      display: grid;
      gap: 24px;
    }
    .subject-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color .3s;
    }
    .subject-card:hover { border-color: color-mix(in srgb, var(--accent) 40%, transparent); }

    .subject-header {
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }
    .subject-name {
      font-size: 17px;
      font-weight: 600;
      color: #fff;
    }
    .subject-toggle {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: transform .3s, background .2s;
      color: var(--muted);
      background: transparent;
    }
    .subject-card.open .subject-toggle { transform: rotate(45deg); background: var(--accent); color: #fff; border-color: var(--accent); }

    .subject-body {
      display: none;
      border-top: 1px solid var(--border);
    }
    .subject-card.open .subject-body { display: grid; grid-template-columns: 1fr 1fr; }
    @media (max-width: 640px) {
      .subject-card.open .subject-body { grid-template-columns: 1fr; }
    }

    .resource-col {
      padding: 20px 24px;
    }
    .resource-col:first-child {
      border-right: 1px solid var(--border);
    }
    .resource-col h4 {
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }

    .resource-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .resource-list li a {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      text-decoration: none;
      color: var(--text);
      font-size: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid transparent;
      transition: background .2s, border-color .2s;
      line-height: 1.4;
    }
    .resource-list li a:hover {
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      border-color: color-mix(in srgb, var(--accent) 30%, transparent);
    }
    .resource-list li a .ri-icon {
      font-size: 18px;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .video-icon  { color: #f43f5e; }
    .pdf-icon    { color: #f59e0b; }

    /* ── Loading / Error ── */
    .loader {
      text-align: center;
      padding: 80px 32px;
      color: var(--muted);
      font-size: 15px;
    }
    .loader .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    .branch-footer {
      margin-top: 64px;
      padding: 24px 32px;
      border-top: 1px solid var(--border);
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>

  <div class="back-bar">
    <a href="/">← Back to SmartShala</a>
  </div>

  <div id="app">
    <div class="loader">
      <div class="spinner"></div>
      Loading resources…
    </div>
  </div>

  <script>
    // ── Helpers ──────────────────────────────────────────────────────────────
    const branchKey = location.pathname.split('/branch/')[1];

    function esc(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── Render ───────────────────────────────────────────────────────────────
    function render(data) {
      // Apply branch accent colour
      document.documentElement.style.setProperty('--accent', data.color);
      document.title = `SmartShala – ${data.name}`;

      const semCount = data.semesters.length;

      const html = `
        <div class="hero">
          <div class="hero-icon">${esc(data.icon)}</div>
          <h1><span>${esc(data.name)}</span></h1>
          <p>${esc(data.description)}</p>
          <div class="hero-badges">
            <span class="badge">${semCount} Semesters</span>
            <span class="badge">${data.semesters.reduce((a,s)=>a+s.subjects.length,0)} Subjects</span>
            <span class="badge">${data.semesters.reduce((a,s)=>s.subjects.reduce((b,sub)=>b+sub.videos.length,a),0)} Video Lectures</span>
            <span class="badge">${data.semesters.reduce((a,s)=>s.subjects.reduce((b,sub)=>b+sub.pdfs.length,a),0)} PDFs</span>
          </div>
        </div>

        <div class="tab-section">
          <div class="sem-tabs" id="semTabs">
            ${data.semesters.map((sem, i) => `
              <button class="sem-tab ${i===0?'active':''}" data-sem="${i}">
                Semester ${sem.sem}
              </button>
            `).join('')}
          </div>

          ${data.semesters.map((sem, si) => `
            <div class="subjects-grid sem-panel ${si===0?'':'hidden'}" data-panel="${si}">
              ${sem.subjects.map(sub => `
                <div class="subject-card">
                  <div class="subject-header" onclick="toggleCard(this)">
                    <span class="subject-name">${esc(sub.name)}</span>
                    <span class="subject-toggle">+</span>
                  </div>
                  <div class="subject-body">
                    <div class="resource-col">
                      <h4>🎬 Video Lectures</h4>
                      <ul class="resource-list">
                        ${sub.videos.map(v => `
                          <li>
                            <a href="${esc(v.url)}" target="_blank" rel="noopener">
                              <span class="ri-icon video-icon">▶</span>
                              ${esc(v.title)}
                            </a>
                          </li>
                        `).join('')}
                      </ul>
                    </div>
                    <div class="resource-col">
                      <h4>📄 PDF Resources</h4>
                      <ul class="resource-list">
                        ${sub.pdfs.map(p => `
                          <li>
                            <a href="${esc(p.url)}" target="_blank" rel="noopener">
                              <span class="ri-icon pdf-icon">📎</span>
                              ${esc(p.title)}
                            </a>
                          </li>
                        `).join('')}
                      </ul>
                    </div>
                  </div>
                </div>
              `).join('')}
            </div>
          `).join('')}
        </div>

        <div class="branch-footer">
          © 2026 SmartShala · ${esc(data.name)} Resources
        </div>
      `;

      document.getElementById('app').innerHTML = html;

      // Wire up semester tabs
      document.querySelectorAll('.sem-tab').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = btn.dataset.sem;
          document.querySelectorAll('.sem-tab').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.sem-panel').forEach(p => p.classList.add('hidden'));
          btn.classList.add('active');
          document.querySelector(`.sem-panel[data-panel="${idx}"]`).classList.remove('hidden');
        });
      });
    }

    // ── Toggle accordion ──────────────────────────────────────────────────────
    function toggleCard(header) {
      header.closest('.subject-card').classList.toggle('open');
    }

    // ── Fetch data ────────────────────────────────────────────────────────────
    fetch(`/api/branch/${branchKey}`)
      .then(r => {
        if (!r.ok) throw new Error('Branch not found');
        return r.json();
      })
      .then(render)
      .catch(err => {
        document.getElementById('app').innerHTML = `
          <div class="loader">
            <p>⚠️ ${err.message}. <a href="/" style="color:var(--accent)">Go back</a></p>
          </div>`;
      });
  </script>

  <style>
    .hidden { display: none !important; }
  </style>
</body>
</html>
